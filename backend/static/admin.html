<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - 西安交大会议室预约系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #1890ff;
            --primary-light: #40a9ff;
            --success: #52c41a;
            --warning: #faad14;
            --danger: #ff4d4f;
            --text: #333;
            --text-light: #666;
            --border: #e8e8e8;
            --bg: #f5f7fa;
            --card: #fff;
            --radius: 12px;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
        }

        /* 顶部导航 */
        .nav {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 16px 24px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-title {
            font-size: 20px;
            font-weight: 600;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .nav-tabs {
            display: flex;
            gap: 4px;
            background: rgba(255, 255, 255, 0.15);
            padding: 4px;
            border-radius: 8px;
        }

        .nav-tab {
            padding: 8px 16px;
            background: transparent;
            border: none;
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-tab.active {
            background: rgba(255, 255, 255, 0.25);
        }

        .api-btn {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 6px;
            color: white;
            cursor: pointer;
            font-size: 14px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .api-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 24px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        /* 校区选择 */
        .campus-tabs {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
        }

        .campus-tab {
            flex: 1;
            padding: 14px;
            background: white;
            border: 2px solid var(--border);
            border-radius: var(--radius);
            text-align: center;
            cursor: pointer;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.2s;
        }

        .campus-tab:hover {
            border-color: var(--primary-light);
        }

        .campus-tab.active {
            border-color: var(--primary);
            background: var(--primary);
            color: white;
        }

        /* 日期栏 */
        .date-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            padding: 16px 20px;
            border-radius: var(--radius);
            margin-bottom: 20px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .date-display {
            font-size: 18px;
            font-weight: 600;
        }

        .date-actions {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        /* 按钮 */
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(24, 144, 255, 0.3);
        }

        .btn-success {
            background: var(--success);
            color: white;
        }

        .btn-danger {
            background: var(--danger);
            color: white;
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text);
        }

        .btn-outline:hover {
            border-color: var(--primary);
            color: var(--primary);
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* 卡片网格 */
        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 16px;
        }

        .room-card {
            background: white;
            border-radius: var(--radius);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }

        .room-card:hover {
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
            border-color: var(--primary-light);
        }

        .room-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }

        .room-name {
            font-size: 18px;
            font-weight: 600;
        }

        .status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .status.available {
            background: #f6ffed;
            color: var(--success);
        }

        .status.busy {
            background: #fff2f0;
            color: var(--danger);
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .status.available .status-dot {
            background: var(--success);
        }

        .status.busy .status-dot {
            background: var(--danger);
        }

        .room-info {
            color: var(--text-light);
            font-size: 14px;
            margin-bottom: 8px;
            display: flex;
            gap: 16px;
        }

        .room-earliest {
            font-size: 14px;
            color: var(--primary);
            font-weight: 500;
        }

        .room-actions {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 8px;
        }

        /* 标签 */
        .campus-tag {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
        }

        .campus-xingqing {
            background: #e6f7ff;
            color: #1890ff;
        }

        .campus-chuangxin {
            background: #f6ffed;
            color: #52c41a;
        }

        /* 模态框 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            padding: 20px;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: var(--radius);
            width: 100%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.2s ease;
        }

        @keyframes modalIn {
            from {
                transform: scale(0.95);
                opacity: 0;
            }

            to {
                transform: scale(1);
                opacity: 1;
            }
        }

        .modal-header {
            padding: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: white;
            z-index: 1;
        }

        .modal-header h3 {
            font-size: 18px;
        }

        .modal-close {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-light);
            line-height: 1;
        }

        .modal-close:hover {
            color: var(--text);
        }

        .modal-body {
            padding: 20px;
        }

        .modal-footer {
            padding: 16px 20px;
            border-top: 1px solid var(--border);
            display: flex;
            justify-content: flex-end;
            gap: 12px;
        }

        /* 时间线 */
        .timeline-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }

        .time-slot {
            border-radius: 6px;
            padding: 10px 4px;
            text-align: center;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .time-slot:hover {
            transform: scale(1.02);
        }

        .time-slot-available {
            background: #f6ffed;
            border: 2px solid #b7eb8f;
        }

        .time-slot-partially_booked {
            background: #fffbe6;
            border: 2px solid #ffe58f;
        }

        .time-slot-fully_booked {
            background: #fff2f0;
            border: 2px solid #ffccc7;
            opacity: 0.8;
            cursor: not-allowed;
        }

        .slot-time {
            font-size: 12px;
            font-weight: 500;
            display: block;
        }

        .slot-info {
            margin-top: 4px;
            font-size: 11px;
            color: #fa8c16;
        }

        .time-slot-fully_booked .slot-info {
            color: var(--danger);
        }

        .legend {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            font-size: 13px;
            color: var(--text-light);
        }

        .legend-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .legend-box {
            width: 16px;
            height: 16px;
            border-radius: 3px;
        }

        .legend-box.available {
            background: #f6ffed;
            border: 2px solid #b7eb8f;
        }

        .legend-box.partially_booked {
            background: #fffbe6;
            border: 2px solid #ffe58f;
        }

        .legend-box.fully_booked {
            background: #fff2f0;
            border: 2px solid #ffccc7;
        }

        /* 时段详情 */
        .slot-detail {
            margin-top: 16px;
            padding: 16px;
            background: #f5f7fa;
            border-radius: 8px;
        }

        .slot-detail-title {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .slot-detail-status {
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .slot-detail-status.available {
            background: #f6ffed;
            color: var(--success);
        }

        .slot-detail-status.partially_booked {
            background: #fffbe6;
            color: var(--warning);
        }

        .slot-detail-status.fully_booked {
            background: #fff2f0;
            color: var(--danger);
        }

        .slot-booking-item {
            background: white;
            padding: 10px 12px;
            border-radius: 6px;
            margin-bottom: 8px;
        }

        .slot-booking-time {
            font-weight: 600;
            color: var(--primary);
            font-size: 14px;
        }

        .slot-booking-name {
            font-size: 13px;
            color: var(--text);
            margin-top: 4px;
        }

        /* 手动时间选择 */
        .manual-time-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid var(--border);
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 12px;
        }

        .time-picker-row {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-bottom: 12px;
        }

        .time-picker-item {
            flex: 1;
        }

        .time-label {
            display: block;
            font-size: 13px;
            color: var(--text-light);
            margin-bottom: 4px;
        }

        .time-input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
        }

        .time-conflict-warning {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
            padding: 12px;
            background: #fff2f0;
            border-radius: 8px;
            font-size: 14px;
            color: var(--danger);
        }

        /* 表单 */
        .form-group {
            margin-bottom: 16px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 500;
            font-size: 14px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            transition: border-color 0.2s;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: var(--primary);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        /* 教职工表格 */
        .table-container {
            background: white;
            border-radius: var(--radius);
            overflow: hidden;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th,
        td {
            padding: 14px 16px;
            text-align: left;
            border-bottom: 1px solid var(--border);
        }

        th {
            background: var(--bg);
            font-weight: 600;
            font-size: 14px;
            color: var(--text);
        }

        td {
            font-size: 14px;
            color: var(--text);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: #fafafa;
        }

        .status-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }

        .status-bound {
            background: #f6ffed;
            color: var(--success);
        }

        .status-unbound {
            background: #fff7e6;
            color: var(--warning);
        }

        /* 搜索框 */
        .search-box {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }

        .search-box input {
            flex: 1;
            padding: 10px 14px;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            font-size: 14px;
        }

        .search-box input:focus {
            outline: none;
            border-color: var(--primary);
        }

        /* Toast */
        .toast {
            position: fixed;
            top: 80px;
            right: 24px;
            padding: 12px 20px;
            border-radius: 8px;
            color: white;
            font-size: 14px;
            z-index: 2000;
            transform: translateX(120%);
            transition: transform 0.3s;
        }

        .toast.show {
            transform: translateX(0);
        }

        .toast.success {
            background: var(--success);
        }

        .toast.error {
            background: var(--danger);
        }

        /* 空状态 */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-light);
        }

        /* 工具栏 */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .toolbar h2 {
            font-size: 20px;
            font-weight: 600;
        }

        /* 预约信息头部 */
        .booking-info-header {
            background: linear-gradient(135deg, #1890ff, #40a9ff);
            color: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .booking-info-header .room-name {
            font-weight: 600;
            margin-bottom: 8px;
        }

        .booking-info-header .time-info {
            font-size: 14px;
            opacity: 0.9;
        }
    </style>
</head>

<body>
    <nav class="nav">
        <div class="nav-title">🏛️ 西安交大会议室预约管理</div>
        <div class="nav-right">
            <div class="nav-tabs">
                <button class="nav-tab active" data-page="booking-page">预约管理</button>
                <button class="nav-tab" data-page="rooms-page">会议室管理</button>
                <button class="nav-tab" data-page="teachers-page">教职工管理</button>
            </div>
            <a href="/docs" target="_blank" class="api-btn">📖 API 文档</a>
        </div>
    </nav>

    <div class="container">
        <!-- 预约管理页面 -->
        <div id="booking-page" class="page active">
            <div class="campus-tabs">
                <div class="campus-tab active" data-campus="xingqing">📍 兴庆校区</div>
                <div class="campus-tab" data-campus="chuangxin">🏫 创新港校区</div>
            </div>
            <div class="date-bar">
                <div class="date-display"><span id="date-text">今天</span></div>
                <div class="date-actions">
                    <input type="date" class="time-input" id="date-picker" style="width: auto;">
                    <button class="btn btn-outline btn-sm" onclick="refreshRooms()">🔄 刷新</button>
                </div>
            </div>
            <div id="rooms-grid" class="rooms-grid"></div>
        </div>

        <!-- 会议室管理页面 -->
        <div id="rooms-page" class="page">
            <div class="toolbar">
                <h2>会议室列表</h2>
                <button class="btn btn-primary" onclick="openAddRoomModal()">+ 添加会议室</button>
            </div>
            <div id="admin-rooms-grid" class="rooms-grid"></div>
        </div>

        <!-- 教职工管理页面 -->
        <div id="teachers-page" class="page">
            <div class="toolbar">
                <h2>教职工白名单</h2>
                <button class="btn btn-primary" onclick="openAddTeacherModal()">+ 添加教职工</button>
            </div>
            <div class="search-box">
                <input type="text" id="teacher-search" placeholder="搜索工号或姓名..." oninput="filterTeachers()">
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>工号</th>
                            <th>姓名</th>
                            <th>联系电话</th>
                            <th>部门</th>
                            <th>绑定状态</th>
                            <th>绑定时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="teachers-table"></tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- 时间线模态框 -->
    <div id="timeline-modal" class="modal-overlay">
        <div class="modal">
            <div class="modal-header">
                <div>
                    <h3 id="modal-room-name">会议室</h3>
                    <div id="modal-room-info" style="font-size: 14px; color: #666; margin-top: 4px;"></div>
                </div>
                <button class="modal-close" onclick="closeTimelineModal()">&times;</button>
            </div>
            <div class="modal-body">
                <p style="margin-bottom: 12px; color: #666;">预约情况（点击时段查看详情或预约）</p>
                <div id="timeline-grid" class="timeline-grid"></div>
                <div class="legend">
                    <div class="legend-item">
                        <div class="legend-box available"></div><span>空闲</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box partially_booked"></div><span>部分占用</span>
                    </div>
                    <div class="legend-item">
                        <div class="legend-box fully_booked"></div><span>已约满</span>
                    </div>
                </div>

                <div id="slot-detail" class="slot-detail" style="display: none;">
                    <div class="slot-detail-title" id="slot-detail-title"></div>
                    <div class="slot-detail-status" id="slot-detail-status"></div>
                    <div id="slot-bookings"></div>
                </div>

                <div class="manual-time-section">
                    <div class="section-title">选择预约时间</div>
                    <div class="time-picker-row">
                        <div class="time-picker-item">
                            <label class="time-label">开始时间</label>
                            <input type="time" class="time-input" id="start-time" value="07:00" min="07:00" max="22:30">
                        </div>
                        <div class="time-picker-item">
                            <label class="time-label">结束时间</label>
                            <input type="time" class="time-input" id="end-time" value="08:00" min="07:30" max="23:00">
                        </div>
                    </div>
                    <div id="time-conflict-warning" class="time-conflict-warning" style="display: none;"></div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeTimelineModal()">取消</button>
                <button class="btn btn-primary" onclick="openBookingForm()">确认预约</button>
            </div>
        </div>
    </div>

    <!-- 预约表单模态框 -->
    <div id="booking-form-modal" class="modal-overlay">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h3>填写预约信息</h3>
                <button class="modal-close" onclick="closeBookingForm()">&times;</button>
            </div>
            <div class="modal-body">
                <div class="booking-info-header">
                    <div class="room-name" id="form-room-name"></div>
                    <div class="time-info"><span id="form-date"></span> · <span id="form-time"></span></div>
                </div>
                <form id="booking-form">
                    <div class="form-group">
                        <label>预约人姓名 <span style="color: var(--danger);">*</span></label>
                        <input type="text" id="teacher-name" required placeholder="请输入姓名">
                    </div>
                    <div class="form-group">
                        <label>联系电话 <span style="color: var(--danger);">*</span></label>
                        <input type="tel" id="teacher-phone" required placeholder="请输入手机号">
                    </div>
                    <div class="form-group">
                        <label>会议主题</label>
                        <input type="text" id="booking-subject" placeholder="选填">
                    </div>
                    <div class="form-group">
                        <label>会议用途</label>
                        <textarea id="booking-purpose" placeholder="选填"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeBookingForm()">取消</button>
                <button class="btn btn-primary" onclick="submitBooking()">提交预约</button>
            </div>
        </div>
    </div>

    <!-- 会议室管理模态框 -->
    <div id="room-form-modal" class="modal-overlay">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h3 id="room-form-title">添加会议室</h3>
                <button class="modal-close" onclick="closeRoomFormModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="room-form">
                    <input type="hidden" id="room-id">
                    <div class="form-group"><label>会议室名称 <span style="color: var(--danger);">*</span></label><input
                            type="text" id="room-name-input" required placeholder="例如：第一会议室"></div>
                    <div class="form-group"><label>所属校区 <span style="color: var(--danger);">*</span></label>
                        <select id="room-campus"
                            style="width: 100%; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px;">
                            <option value="xingqing">兴庆校区</option>
                            <option value="chuangxin">创新港校区</option>
                        </select>
                    </div>
                    <div class="form-group"><label>容纳人数</label><input type="number" id="room-capacity" value="20"
                            min="1"></div>
                    <div class="form-group"><label>位置</label><input type="text" id="room-location"
                            placeholder="例如：主楼201"></div>
                    <div class="form-group"><label>设备说明</label><textarea id="room-equipment"
                            placeholder="例如：投影仪、白板、空调"></textarea></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeRoomFormModal()">取消</button>
                <button class="btn btn-primary" onclick="saveRoom()">保存</button>
            </div>
        </div>
    </div>

    <!-- 教职工管理模态框 -->
    <div id="teacher-modal" class="modal-overlay">
        <div class="modal" style="max-width: 450px;">
            <div class="modal-header">
                <h3 id="teacher-modal-title">添加教职工</h3>
                <button class="modal-close" onclick="closeTeacherModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="teacher-form">
                    <input type="hidden" id="teacher-id">
                    <div class="form-group"><label>工号 <span style="color: var(--danger);">*</span></label><input
                            type="text" id="employee-id" required placeholder="例如：10001"></div>
                    <div class="form-group"><label>姓名 <span style="color: var(--danger);">*</span></label><input
                            type="text" id="teacher-name-input" required placeholder="请输入姓名"></div>
                    <div class="form-group"><label>联系电话</label><input type="text" id="teacher-phone-input"
                            placeholder="例如：13800138000"></div>
                    <div class="form-group"><label>部门</label><input type="text" id="teacher-department"
                            placeholder="例如：计算机学院"></div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-outline" onclick="closeTeacherModal()">取消</button>
                <button class="btn btn-primary" onclick="saveTeacher()">保存</button>
            </div>
        </div>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        const API_BASE = '';
        let currentCampus = 'xingqing';
        let currentDate = formatDate(new Date());
        let rooms = [];
        let adminRooms = [];
        let teachers = [];
        let timelineSlots = [];
        let currentRoom = null;

        document.addEventListener('DOMContentLoaded', () => {
            initDatePicker();
            loadRooms();
            loadAdminRooms();
            loadTeachers();

            // 导航标签切换
            document.querySelectorAll('.nav-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
                    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
                    tab.classList.add('active');
                    document.getElementById(tab.dataset.page).classList.add('active');
                });
            });

            // 校区标签切换
            document.querySelectorAll('.campus-tab').forEach(tab => {
                tab.addEventListener('click', () => {
                    document.querySelectorAll('.campus-tab').forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    currentCampus = tab.dataset.campus;
                    loadRooms();
                });
            });

            // 日期选择
            document.getElementById('date-picker').addEventListener('change', (e) => {
                currentDate = e.target.value;
                updateDateDisplay();
                loadRooms();
            });

            // 时间选择监听
            document.getElementById('start-time').addEventListener('change', validateTime);
            document.getElementById('end-time').addEventListener('change', validateTime);
        });

        function initDatePicker() {
            const picker = document.getElementById('date-picker');
            const today = new Date();
            picker.value = formatDate(today);
            picker.min = formatDate(new Date(today.getTime() - 7 * 24 * 60 * 60 * 1000));
            picker.max = formatDate(new Date(today.getTime() + 365 * 24 * 60 * 60 * 1000));
            updateDateDisplay();
        }

        function updateDateDisplay() {
            const today = formatDate(new Date());
            const tomorrow = formatDate(new Date(Date.now() + 24 * 60 * 60 * 1000));
            const dateText = document.getElementById('date-text');
            if (currentDate === today) { dateText.textContent = '今天'; }
            else if (currentDate === tomorrow) { dateText.textContent = '明天'; }
            else { const d = new Date(currentDate); const days = ['周日', '周一', '周二', '周三', '周四', '周五', '周六']; dateText.textContent = `${d.getMonth() + 1}月${d.getDate()}日 ${days[d.getDay()]}`; }
        }

        function formatDate(date) { return date.toISOString().split('T')[0]; }

        // ==================== 预约管理 ====================

        async function loadRooms() {
            try {
                const res = await fetch(`${API_BASE}/api/rooms?campus=${currentCampus}&date=${currentDate}`);
                if (!res.ok) {
                    const errText = await res.text();
                    console.error('API 错误:', res.status, errText);
                    showToast(`加载失败: ${res.status}`, 'error');
                    return;
                }
                rooms = await res.json();
                renderRooms();
            } catch (err) {
                console.error('加载会议室失败:', err);
                showToast('加载失败: ' + err.message, 'error');
            }
        }

        function renderRooms() {
            const container = document.getElementById('rooms-grid');
            if (rooms.length === 0) { container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1"><p>暂无会议室</p></div>'; return; }
            container.innerHTML = rooms.map(room => `
                <div class="room-card" onclick="openTimeline(${room.id})">
                    <div class="room-header">
                        <div class="room-name">${escapeHtml(room.name)}</div>
                        <div class="status ${room.is_available ? 'available' : 'busy'}"><div class="status-dot"></div><span>${room.is_available ? '空闲' : '占用中'}</span></div>
                    </div>
                    <div class="room-info"><span>📍 ${escapeHtml(room.location || '未设置')}</span><span>👥 ${room.capacity}人</span></div>
                    <div class="room-earliest">最早可预约：${room.earliest_available}</div>
                </div>
            `).join('');
        }

        function refreshRooms() { loadRooms(); showToast('已刷新', 'success'); }

        async function openTimeline(roomId) {
            currentRoom = rooms.find(r => r.id === roomId);
            document.getElementById('modal-room-name').textContent = currentRoom.name;
            document.getElementById('modal-room-info').textContent = `${currentRoom.location || ''} · ${currentRoom.capacity}人`;
            document.getElementById('slot-detail').style.display = 'none';
            try {
                const res = await fetch(`${API_BASE}/api/rooms/${roomId}/timeline?date=${currentDate}`);
                const data = await res.json();
                timelineSlots = data.slots;
                renderTimeline();
                document.getElementById('timeline-modal').classList.add('active');
            } catch (err) { showToast('加载时间线失败', 'error'); }
        }

        function renderTimeline() {
            const container = document.getElementById('timeline-grid');
            container.innerHTML = timelineSlots.map((slot, index) => `
                <div class="time-slot time-slot-${slot.status}" data-index="${index}" onclick="showSlotDetail(${index})">
                    <span class="slot-time">${slot.start_time}</span>
                    ${slot.status !== 'available' ? `<div class="slot-info">${slot.bookings.length}个预约</div>` : ''}
                </div>
            `).join('');
            validateTime();
        }

        function showSlotDetail(index) {
            const slot = timelineSlots[index];
            const detailEl = document.getElementById('slot-detail');
            const titleEl = document.getElementById('slot-detail-title');
            const statusEl = document.getElementById('slot-detail-status');
            const bookingsEl = document.getElementById('slot-bookings');

            titleEl.textContent = `${slot.start_time} - ${parseInt(slot.start_time.split(':')[0]) + 1}:00`;
            statusEl.className = `slot-detail-status ${slot.status}`;

            if (slot.status === 'available') {
                statusEl.textContent = '空闲可预约';
            } else if (slot.status === 'partially_booked') {
                statusEl.textContent = `部分占用，最早可预约: ${slot.earliest_available}`;
            } else {
                statusEl.textContent = '已约满';
            }

            if (slot.bookings && slot.bookings.length > 0) {
                bookingsEl.innerHTML = slot.bookings.map(b => `
                    <div class="slot-booking-item">
                        <div class="slot-booking-time">${b.start_time} - ${b.end_time}</div>
                        <div class="slot-booking-name">${b.teacher_name}${b.purpose ? ` - ${b.purpose}` : ''}</div>
                    </div>
                `).join('');
            } else {
                bookingsEl.innerHTML = '';
            }

            detailEl.style.display = 'block';

            if (slot.status !== 'fully_booked') {
                document.getElementById('start-time').value = slot.earliest_available || slot.start_time;
                validateTime();
            }
        }

        function validateTime() {
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            const warningEl = document.getElementById('time-conflict-warning');

            if (!startTime || !endTime) { warningEl.style.display = 'none'; return; }

            for (const slot of timelineSlots) {
                for (const booking of slot.bookings) {
                    if (startTime < booking.end_time && endTime > booking.start_time) {
                        warningEl.innerHTML = `⚠️ 与 ${booking.teacher_name} 的预约冲突（${booking.start_time}-${booking.end_time}）`;
                        warningEl.style.display = 'flex';
                        return;
                    }
                }
            }
            warningEl.style.display = 'none';
        }

        function closeTimelineModal() { document.getElementById('timeline-modal').classList.remove('active'); }

        function openBookingForm() {
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;
            if (!startTime || !endTime) { showToast('请选择预约时间', 'error'); return; }

            document.getElementById('form-room-name').textContent = currentRoom.name;
            document.getElementById('form-date').textContent = currentDate;
            document.getElementById('form-time').textContent = `${startTime} - ${endTime}`;
            const savedName = localStorage.getItem('admin_teacher_name');
            if (savedName) document.getElementById('teacher-name').value = savedName;
            document.getElementById('booking-form-modal').classList.add('active');
        }

        function closeBookingForm() { document.getElementById('booking-form-modal').classList.remove('active'); }

        async function submitBooking() {
            const name = document.getElementById('teacher-name').value.trim();
            const phone = document.getElementById('teacher-phone').value.trim();
            const subject = document.getElementById('booking-subject').value.trim();
            const purpose = document.getElementById('booking-purpose').value.trim();
            const startTime = document.getElementById('start-time').value;
            const endTime = document.getElementById('end-time').value;

            if (!name) { showToast('请输入姓名', 'error'); return; }
            if (!phone || !/^1[3-9]\d{9}$/.test(phone)) { showToast('请输入正确的手机号', 'error'); return; }

            try {
                const res = await fetch(`${API_BASE}/api/bookings`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ room_id: currentRoom.id, date: currentDate, start_time: startTime, end_time: endTime, teacher_name: name, phone: phone, subject: subject || null, purpose: purpose || null })
                });
                if (res.ok) {
                    localStorage.setItem('admin_teacher_name', name);
                    showToast('预约成功', 'success');
                    closeBookingForm();
                    closeTimelineModal();
                    loadRooms();
                } else {
                    const err = await res.json();
                    showToast(err.detail || '预约失败', 'error');
                }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        // ==================== 会议室管理 ====================

        async function loadAdminRooms() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/rooms`);
                if (!res.ok) {
                    const errText = await res.text();
                    console.error('加载会议室失败:', res.status, errText);
                    return;
                }
                adminRooms = await res.json();
                renderAdminRooms();
            } catch (err) {
                console.error('加载会议室失败:', err);
            }
        }

        function renderAdminRooms() {
            const container = document.getElementById('admin-rooms-grid');
            if (adminRooms.length === 0) { container.innerHTML = '<div class="empty-state" style="grid-column: 1/-1"><p>暂无会议室</p></div>'; return; }
            container.innerHTML = adminRooms.map(room => `
                <div class="room-card" style="cursor: default;">
                    <div class="room-header">
                        <div class="room-name">${escapeHtml(room.name)}</div>
                        <span class="campus-tag campus-${room.campus}">${room.campus === 'xingqing' ? '兴庆校区' : '创新港校区'}</span>
                    </div>
                    <div class="room-info"><span>📍 ${escapeHtml(room.location || '未设置')}</span><span>👥 ${room.capacity}人</span></div>
                    <div class="room-info" style="font-size: 13px;">🛠️ ${escapeHtml(room.equipment || '暂无设备信息')}</div>
                    <div class="room-actions">
                        <button class="btn btn-outline btn-sm" onclick="editRoom(${room.id})">编辑</button>
                        <button class="btn btn-danger btn-sm" onclick="deleteRoom(${room.id})">删除</button>
                    </div>
                </div>
            `).join('');
        }

        function openAddRoomModal() {
            document.getElementById('room-form-title').textContent = '添加会议室';
            document.getElementById('room-form').reset();
            document.getElementById('room-id').value = '';
            document.getElementById('room-form-modal').classList.add('active');
        }

        function editRoom(id) {
            const room = adminRooms.find(r => r.id === id);
            if (room) {
                document.getElementById('room-form-title').textContent = '编辑会议室';
                document.getElementById('room-id').value = room.id;
                document.getElementById('room-name-input').value = room.name;
                document.getElementById('room-campus').value = room.campus;
                document.getElementById('room-capacity').value = room.capacity;
                document.getElementById('room-location').value = room.location || '';
                document.getElementById('room-equipment').value = room.equipment || '';
                document.getElementById('room-form-modal').classList.add('active');
            }
        }

        function closeRoomFormModal() { document.getElementById('room-form-modal').classList.remove('active'); }

        async function saveRoom() {
            const id = document.getElementById('room-id').value;
            const data = {
                name: document.getElementById('room-name-input').value.trim(),
                campus: document.getElementById('room-campus').value,
                capacity: parseInt(document.getElementById('room-capacity').value) || 20,
                location: document.getElementById('room-location').value.trim(),
                equipment: document.getElementById('room-equipment').value.trim()
            };
            if (!data.name) { showToast('请填写会议室名称', 'error'); return; }
            try {
                const url = id ? `${API_BASE}/api/admin/rooms/${id}` : `${API_BASE}/api/admin/rooms`;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (res.ok) { showToast(id ? '修改成功' : '添加成功', 'success'); closeRoomFormModal(); loadAdminRooms(); loadRooms(); }
                else { const err = await res.json(); showToast(err.detail || '操作失败', 'error'); }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        async function deleteRoom(id) {
            if (!confirm('确定要删除这个会议室吗？')) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/rooms/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast('删除成功', 'success'); loadAdminRooms(); loadRooms(); }
                else { showToast('删除失败', 'error'); }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        // ==================== 教职工管理 ====================

        async function loadTeachers() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/teachers`);
                if (!res.ok) {
                    const errText = await res.text();
                    console.error('加载教职工失败:', res.status, errText);
                    return;
                }
                teachers = await res.json();
                renderTeachers();
            } catch (err) {
                console.error('加载教职工失败:', err);
            }
        }

        function renderTeachers(filteredTeachers = null) {
            const tbody = document.getElementById('teachers-table');
            const data = filteredTeachers || teachers;

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="7" style="text-align: center; padding: 40px; color: var(--text-light);">暂无教职工数据，点击上方按钮添加</td></tr>';
                return;
            }

            tbody.innerHTML = data.map(teacher => `
                <tr>
                    <td>${escapeHtml(teacher.employee_id)}</td>
                    <td>${escapeHtml(teacher.name)}</td>
                    <td>${escapeHtml(teacher.phone || '-')}</td>
                    <td>${escapeHtml(teacher.department || '-')}</td>
                    <td>${teacher.is_bound ? '<span class="status-badge status-bound">✓ 已绑定</span>' : '<span class="status-badge status-unbound">○ 未绑定</span>'}</td>
                    <td style="font-size: 13px; color: var(--text-light);">${teacher.bound_at ? formatTime(teacher.bound_at) : '-'}</td>
                    <td>
                        <button class="btn btn-outline btn-sm" onclick="editTeacher(${teacher.id})">编辑</button>
                        ${teacher.is_bound ? '<button class="btn btn-outline btn-sm" style="color: var(--warning); border-color: var(--warning);" onclick="unbindTeacher(' + teacher.id + ')">解绑</button>' : ''}
                        <button class="btn btn-danger btn-sm" onclick="deleteTeacher(${teacher.id})">删除</button>
                    </td>
                </tr>
            `).join('');
        }

        function formatTime(dateStr) {
            const date = new Date(dateStr);
            return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, '0')}-${String(date.getDate()).padStart(2, '0')} ${String(date.getHours()).padStart(2, '0')}:${String(date.getMinutes()).padStart(2, '0')}`;
        }

        function filterTeachers() {
            const keyword = document.getElementById('teacher-search').value.trim().toLowerCase();
            if (!keyword) { renderTeachers(); return; }
            const filtered = teachers.filter(t => t.employee_id.toLowerCase().includes(keyword) || t.name.toLowerCase().includes(keyword));
            renderTeachers(filtered);
        }

        function openAddTeacherModal() {
            document.getElementById('teacher-modal-title').textContent = '添加教职工';
            document.getElementById('teacher-form').reset();
            document.getElementById('teacher-id').value = '';
            document.getElementById('teacher-modal').classList.add('active');
        }

        function editTeacher(id) {
            const teacher = teachers.find(t => t.id === id);
            if (!teacher) return;
            document.getElementById('teacher-modal-title').textContent = '编辑教职工';
            document.getElementById('teacher-id').value = teacher.id;
            document.getElementById('employee-id').value = teacher.employee_id;
            document.getElementById('teacher-name-input').value = teacher.name;
            document.getElementById('teacher-phone-input').value = teacher.phone || '';
            document.getElementById('teacher-department').value = teacher.department || '';
            document.getElementById('teacher-modal').classList.add('active');
        }

        function closeTeacherModal() { document.getElementById('teacher-modal').classList.remove('active'); }

        async function saveTeacher() {
            const id = document.getElementById('teacher-id').value;
            const data = {
                employee_id: document.getElementById('employee-id').value.trim(),
                name: document.getElementById('teacher-name-input').value.trim(),
                phone: document.getElementById('teacher-phone-input').value.trim(),
                department: document.getElementById('teacher-department').value.trim()
            };

            if (!data.employee_id || !data.name) { showToast('请填写工号和姓名', 'error'); return; }

            try {
                const url = id ? `${API_BASE}/api/admin/teachers/${id}` : `${API_BASE}/api/admin/teachers`;
                const method = id ? 'PUT' : 'POST';
                const res = await fetch(url, { method, headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
                if (res.ok) { showToast(id ? '修改成功' : '添加成功', 'success'); closeTeacherModal(); loadTeachers(); }
                else { const err = await res.json(); showToast(err.detail || '操作失败', 'error'); }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        async function deleteTeacher(id) {
            const teacher = teachers.find(t => t.id === id);
            const message = teacher && teacher.is_bound ? '该教职工已绑定微信，删除后将同时解除绑定。确定要删除吗？' : '确定要删除这个教职工吗？';
            if (!confirm(message)) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/teachers/${id}`, { method: 'DELETE' });
                if (res.ok) { showToast('删除成功', 'success'); loadTeachers(); }
                else { showToast('删除失败', 'error'); }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        async function unbindTeacher(id) {
            const teacher = teachers.find(t => t.id === id);
            if (!teacher) return;
            if (!confirm(`确定要解除 ${teacher.name}（${teacher.employee_id}）的微信绑定吗？\n解绑后该用户需要重新验证身份。`)) return;
            try {
                const res = await fetch(`${API_BASE}/api/admin/unbind/${id}`, { method: 'POST' });
                if (res.ok) { showToast('解绑成功', 'success'); loadTeachers(); }
                else { showToast('解绑失败', 'error'); }
            } catch (err) { showToast('网络错误', 'error'); }
        }

        // ==================== 通用功能 ====================

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            setTimeout(() => toast.classList.remove('show'), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
        }

        // ESC 关闭模态框
        document.addEventListener('keydown', (e) => { if (e.key === 'Escape') { closeTimelineModal(); closeBookingForm(); closeRoomFormModal(); closeTeacherModal(); } });

        // 点击模态框外部关闭
        document.querySelectorAll('.modal-overlay').forEach(overlay => {
            overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.classList.remove('active'); });
        });
    </script>
</body>

</html>
